    <text x="755" y="494" text-anchor="middle" class="node">Mechanism</text>
    <text x="755" y="514" text-anchor="middle" class="nodeSub">causal chain</text>

    <rect x="374" y="552" width="142" height="56" rx="13" fill="url(#greenSoft)" stroke="#A8D79A" stroke-width="2"/>
    <text x="445" y="576" text-anchor="middle" class="node">Feasibility</text>
    <text x="445" y="596" text-anchor="middle" class="nodeSub">cost</text>

    <rect x="684" y="552" width="142" height="56" rx="13" fill="url(#orangeSoft)" stroke="#F0B46D" stroke-width="2"/>
    <text x="755" y="576" text-anchor="middle" class="node">Reviewer</text>
    <text x="755" y="596" text-anchor="middle" class="nodeSub">risk</text>

    <path d="M516 498C545 479 570 473 600 477C630 473 655 479 684 498" stroke="#A7B0BF" stroke-width="1.5" fill="none"/>
    <path d="M516 580C545 599 570 605 600 599C630 605 655 599 684 580" stroke="#A7B0BF" stroke-width="1.5" fill="none"/>
    <line x1="516" y1="498" x2="558" y2="512" stroke="#A7B0BF" stroke-width="1.5"/>
    <line x1="684" y1="498" x2="642" y2="512" stroke="#A7B0BF" stroke-width="1.5"/>
    <line x1="516" y1="580" x2="558" y2="536" stroke="#A7B0BF" stroke-width="1.5"/>
    <line x1="684" y1="580" x2="642" y2="536" stroke="#A7B0BF" stroke-width="1.5"/>
  </g>

