  <g filter="url(#shadow)">
    <rect x="35" y="125" width="250" height="210" rx="18" fill="url(#blueSoft)" stroke="#8FB4EA" stroke-width="2.2"/>
    <rect x="35" y="125" width="250" height="6" rx="3" fill="url(#barBlue)"/>
    <text x="160" y="166" text-anchor="middle" class="section">Research Console</text>
    <text x="160" y="190" text-anchor="middle" class="sectionSub">REACT + VITE</text>

    <rect x="120" y="208" width="80" height="44" rx="8" fill="#FFFFFF" stroke="#7FA7E8" stroke-width="1.8"/>
