    <line x1="134" y1="236" x2="174" y2="236" stroke="#3F7EE8" stroke-width="2.4" opacity=".38"/>
    <line x1="148" y1="260" x2="172" y2="260" stroke="#3F7EE8" stroke-width="2.4"/>

    <rect x="62" y="276" width="196" height="38" rx="10" fill="#FFFFFF" stroke="#AFC8EF" stroke-width="1.6"/>
