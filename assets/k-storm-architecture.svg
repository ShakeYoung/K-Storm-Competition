  <!-- Arrows -->
  <path d="M285 230H375" class="blueFlow"/>
  <path d="M600 315V380" class="darkFlow"/>
  <path d="M855 505H935" class="blueFlow"/>
  <path d="M600 625V660" class="greenFlow"/>
  <path d="M285 665H345" class="dashFlow"/>
  <path d="M825 243H965" class="dashFlow"/>
  <path d="M285 460H345" stroke="#CBD5E1" stroke-width="2.2" fill="none" marker-end="url(#arrowDark)"/>

  <rect x="313" y="200" width="42" height="24" rx="6" fill="#FFFFFF" opacity=".96"/>
  <text x="334" y="217" text-anchor="middle" class="tiny">input</text>
