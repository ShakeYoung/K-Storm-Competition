<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1600" viewBox="0 0 1200 800" font-family="Arial, Helvetica, 'Segoe UI', sans-serif" shape-rendering="geometricPrecision" text-rendering="optimizeLegibility">
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="135%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.13"/>
    </filter>
    <radialGradient id="halo" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#DCEBFF" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#F0F7FF" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blueSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4FAFF"/><stop offset="100%" stop-color="#E6F1FF"/>
    </linearGradient>
    <linearGradient id="greenSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4FFF8"/><stop offset="100%" stop-color="#E6F7EE"/>
    </linearGradient>
    <linearGradient id="purpleSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCF7FF"/><stop offset="100%" stop-color="#F0E6FF"/>
    </linearGradient>
    <linearGradient id="orangeSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9F1"/><stop offset="100%" stop-color="#FFECCB"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E7F2FF"/><stop offset="100%" stop-color="#FFF4DF"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3F7EE8"/><stop offset="100%" stop-color="#16B8C5"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#3F7EE8"/></marker>
    <marker id="arrowDark" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#1F2937"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#239553"/></marker>
    <marker id="arrowPurple" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#9656D5"/></marker>
    <style>
      .title { font-size: 34px; font-weight: 900; fill: #0F172A; letter-spacing: .3px; }
      .subtitle { font-size: 14px; font-weight: 800; fill: #5B6678; letter-spacing: 1.2px; }
      .section { font-size: 22px; font-weight: 900; fill: #111827; }
      .sectionSub { font-size: 13px; font-weight: 800; fill: #667085; letter-spacing: .7px; }
      .node { font-size: 18px; font-weight: 900; fill: #111827; }
      .nodeSub { font-size: 14px; font-weight: 750; fill: #596579; }
      .body { font-size: 16px; font-weight: 800; fill: #253041; }
      .bodySmall { font-size: 14.5px; font-weight: 800; fill: #344054; }
      .tiny { font-size: 12px; font-weight: 750; fill: #687589; }
      .blueFlow { stroke: #3F7EE8; stroke-width: 2.6; fill: none; marker-end: url(#arrowBlue); }
      .darkFlow { stroke: #1F2937; stroke-width: 2.5; fill: none; marker-end: url(#arrowDark); }
      .greenFlow { stroke: #239553; stroke-width: 2.6; fill: none; marker-end: url(#arrowGreen); }
      .purpleFlow { stroke: #9656D5; stroke-width: 2.4; fill: none; marker-end: url(#arrowPurple); }
      .dashFlow { stroke: #5F8BE8; stroke-width: 2.4; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowBlue); }
    </style>
