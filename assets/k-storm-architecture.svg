    <rect x="35" y="380" width="250" height="6" rx="3" fill="#A7B0BF"/>
    <text x="160" y="422" text-anchor="middle" class="section">Workspace</text>
    <rect x="62" y="448" width="196" height="32" rx="8" fill="#F6F8FB" stroke="#E1E6EF"/>
