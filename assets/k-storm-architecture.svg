    <text x="600" y="255" text-anchor="middle" class="node">Scheduler</text>
    <text x="600" y="275" text-anchor="middle" class="nodeSub">state</text>

    <rect x="678" y="232" width="124" height="52" rx="12" fill="url(#purpleSoft)" stroke="#C68BE2" stroke-width="1.8"/>
    <text x="740" y="255" text-anchor="middle" class="node">Router</text>
    <text x="740" y="275" text-anchor="middle" class="nodeSub">model</text>
  </g>

