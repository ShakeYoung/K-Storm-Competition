    <rect x="965" y="300" width="170" height="46" rx="11" fill="#F3E8FF" stroke="#C68BE2" stroke-width="1.9"/>
    <text x="1050" y="329" text-anchor="middle" class="body">IR Summary</text>

    <rect x="965" y="380" width="170" height="62" rx="11" fill="#FFFFFF" stroke="#1F2937" stroke-width="1.9"/>
    <text x="1050" y="406" text-anchor="middle" class="body">Structured IR</text>
    <text x="1050" y="427" text-anchor="middle" class="tiny">evidence · conflict</text>

    <rect x="965" y="490" width="170" height="46" rx="11" fill="#FFEBCB" stroke="#F0B46D" stroke-width="1.9"/>
    <text x="1050" y="519" text-anchor="middle" class="body">Evidence Check</text>

    <rect x="965" y="574" width="170" height="46" rx="11" fill="#F3E8FF" stroke="#C68BE2" stroke-width="1.9"/>
    <text x="1050" y="603" text-anchor="middle" class="body">Output Agent</text>

    <rect x="965" y="658" width="170" height="50" rx="11" fill="#FFFFFF" stroke="#1F2937" stroke-width="1.9"/>
    <text x="1050" y="689" text-anchor="middle" class="node">Markdown</text>

    <line x1="1050" y1="266" x2="1050" y2="300" class="purpleFlow"/>
    <line x1="1050" y1="346" x2="1050" y2="380" class="purpleFlow"/>
    <line x1="1050" y1="442" x2="1050" y2="490" class="purpleFlow"/>
    <line x1="1050" y1="536" x2="1050" y2="574" class="purpleFlow"/>
    <line x1="1050" y1="620" x2="1050" y2="658" class="purpleFlow"/>
