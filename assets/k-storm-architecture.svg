  <text x="893" y="492" text-anchor="middle" class="tiny">IR</text>
  <rect x="612" y="632" width="58" height="24" rx="6" fill="#FFFFFF" opacity=".96"/>
  <text x="641" y="649" text-anchor="middle" class="tiny">persist</text>

  <text x="600" y="778" text-anchor="middle" class="tiny">K-Storm v1.6 · Local-first research brainstorming · MIT License</text>
</svg>
