    <circle cx="600" cy="522" r="39" fill="#FFFFFF" stroke="#F2CC8D" stroke-width="1.4"/>
    <text x="600" y="518" text-anchor="middle" class="node">Debate</text>
    <text x="600" y="538" text-anchor="middle" class="node">Core</text>

    <rect x="374" y="470" width="142" height="56" rx="13" fill="url(#blueSoft)" stroke="#93B6EA" stroke-width="2"/>
